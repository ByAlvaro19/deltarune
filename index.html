  <script>

  <script>
    const sndMenuMove = new Audio('audios/snd_menumove.mp3');
    const sndSelect = new Audio('audios/snd_select.mp3');

    function playMove() {
      sndMenuMove.currentTime = 0;
      sndMenuMove.play().catch(() => {});
    }

    function playSelect() {
      sndSelect.currentTime = 0;
      sndSelect.play().catch(() => {});
    }

    // --- Core Engine IndexedDB Match ---
    const DB_NAME = '/_savedata';
    const STORE_NAME = 'FILE_DATA';

    function getDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME);
        request.onupgradeneeded = (e) => {
          e.target.result.createObjectStore(STORE_NAME);
        };
        request.onsuccess = (e) => resolve(e.target.result);
        request.onerror = (e) => reject(e.target.error);
      });
    }

    async function getAllSaves() {
      const db = await getDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.openCursor();
        const data = {};
        request.onsuccess = (e) => {
          const cursor = e.target.result;
          if (cursor) {
            data[cursor.key] = cursor.value;
            cursor.continue();
          } else {
            resolve(data);
          }
        };
        request.onerror = (e) => reject(e.target.error);
      });
    }

    async function setSaveItem(key, textContent) {
      const db = await getDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        
        // Emscripten IDBFS format conversion
        const uint8Contents = new TextEncoder().encode(textContent);
        const emscriptenFileObj = {
          timestamp: new Date(),
          mode: 33206, // Standard file mode (0100666)
          contents: uint8Contents
        };

        tx.objectStore(STORE_NAME).put(emscriptenFileObj, key);
        tx.oncomplete = () => resolve();
        tx.onerror = (e) => reject(e.target.error);
      });
    }

    // --- Save Data Functions ---
    async function exportSave() {
      playSelect();
      const zip = new JSZip();
      let hasData = false;

      try {
        const allData = await getAllSaves();
        for (const key in allData) {
          if (key.includes('filech') || key.includes('dr_') || key.includes('_savedata')) {
            const cleanKey = key.replace(/^\/_savedata\//, '');
            
            // Convert Emscripten binary array back into readable text for the zip
            let rawText = "";
            if (allData[key] && allData[key].contents) {
              rawText = new TextDecoder().decode(allData[key].contents);
            } else if (typeof allData[key] === 'string') {
              rawText = allData[key];
            }

            zip.file(cleanKey, rawText);
            hasData = true;
          }
        }

        if (!hasData) {
          alert('No save data found in the engine database!');
          return;
        }

        zip.generateAsync({type:"blob"}).then(function(content) {
          const a = document.createElement("a");
          a.href = URL.createObjectURL(content);
          a.download = "deltarune_saves.zip";
          a.click();
        });
      } catch (err) {
        alert('Failed to export saves.');
        console.error(err);
      }
    }

    function importSave(input) {
      playSelect();
      const file = input.files[0];
      if (!file) return;

      const zip = new JSZip();
      zip.loadAsync(file).then(function(jsZipInstance) {
        const promises = [];
        
        jsZipInstance.forEach(function (relativePath, zipEntry) {
          if (!zipEntry.dir) {
            const p = zipEntry.async("string").then(function (content) {
              let fullKey = zipEntry.name;
              if (!fullKey.startsWith('/_savedata/')) {
                fullKey = '/_savedata/' + fullKey;
              }
              return setSaveItem(fullKey, content);
            });
            promises.push(p);
          }
        });

        if (promises.length === 0) {
          throw new Error("Zip file is empty!");
        }

        return Promise.all(promises);
      }).then(function() {
        alert('Saves imported successfully! Reloading...');
        window.location.reload();
      }).catch(err => {
        alert("Error importing zip file.");
        console.error(err);
      });
    }

    document.querySelectorAll('.row, .disabled-row').forEach(row => {
      row.addEventListener('click', () => {
        playSelect();
      });
    });

    let gamestarted = false;
    function updateButton() {}
    function loadChapter(chapter) {
      playSelect();
      const chapterPath = `chapter${chapter}/`;
      fetch(`${chapterPath}index.html`).then(res => {
        if (!res.ok) {
          throw new Error(`Failed to load ${chapterPath}index.html`);
        }
        return res.text();
      }).then(html => {
        gamestarted = true;
        const chapterDocument = new DOMParser().parseFromString(html, 'text/html');
        let base = chapterDocument.querySelector('base');
        if (!base) {
          base = chapterDocument.createElement('base');
          chapterDocument.head.prepend(base);
        }
        base.href = new URL(chapterPath, window.location.href).href;
        document.documentElement.innerHTML = chapterDocument.documentElement.innerHTML;
        document.documentElement.querySelectorAll('script').forEach(oldScript => {
          const newScript = document.createElement('script');
          if (oldScript.src) {
            newScript.src = oldScript.src;
          } else {
            newScript.textContent = oldScript.textContent;
          }
          document.body.appendChild(newScript);
        });
      }).catch(error => {
        console.error(error);
        window.location.href = `${chapterPath}index.html`;
      });
    }

    document.querySelectorAll('.row').forEach(row => {
      row.addEventListener('mouseenter', () => {
        if (!gamestarted) {
          playMove();
          if (selectedChapter !== null) {
            document.querySelectorAll('.row')[selectedChapter].classList.remove("selected");
          }
        }
      });
    });
    let selectedChapter = null;
    document.addEventListener('keydown', function(event) {
      if (!gamestarted) {
      if (event.key === 'ArrowUp') {
        playMove();
        if (selectedChapter === null) {
          selectedChapter = 0;
          document.querySelectorAll('.row')[0].classList.add("selected");
        } else {
          document.querySelectorAll('.row')[selectedChapter].classList.remove("selected");
          selectedChapter--;
          if (selectedChapter < 0) {
            selectedChapter = document.querySelectorAll('.row').length - 1;
          }
          document.querySelectorAll('.row')[selectedChapter].classList.add("selected");
        }
      } else if (event.key === 'ArrowDown') {
        playMove();
        if (selectedChapter === null) {
          selectedChapter = 0;
          document.querySelectorAll('.row')[0].classList.add("selected");
        } else {
          if (selectedChapter+1 >= document.querySelectorAll('.row').length) {
            document.querySelectorAll('.row')[selectedChapter].classList.remove("selected");
            selectedChapter = 0;
            document.querySelectorAll('.row')[0].classList.add("selected");
          } else {
            document.querySelectorAll('.row')[selectedChapter].classList.remove("selected");
            selectedChapter++;
            document.querySelectorAll('.row')[selectedChapter].classList.add("selected");
          }
        }
      } else if (event.key === 'Enter') {
        if (selectedChapter !== null) {
          playSelect();
          window.location.href = document.querySelectorAll('.row')[selectedChapter].href;
        }
      }
      }
    });
  </script>
